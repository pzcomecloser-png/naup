<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>게임 모음</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    width: 100%; height: 100%; background: #0a0a1a;
    font-family: 'Courier New', 'Malgun Gothic', monospace;
    overflow: hidden;
  }
  #app {
    position: relative; width: 100%; height: 100%; max-width: 480px; margin: 0 auto;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 26px; padding: 24px;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04) 0, transparent 40%),
      #0a0a1a;
  }

  .page-title {
    color: #ffe15a; font-size: clamp(18px, 6vw, 26px); font-weight: 900;
    letter-spacing: 2px; text-shadow: 2px 2px 0 #000, 0 0 14px rgba(255,225,90,.5);
    margin-bottom: 6px; text-align: center;
  }

  .card-list { display: flex; flex-direction: column; gap: 18px; width: 100%; max-width: 320px; }

  .game-card {
    display: flex; align-items: center; gap: 14px;
    background: #14142c; border: 3px solid #3a3a5c; border-radius: 6px;
    padding: 12px 14px; text-decoration: none; cursor: pointer;
    box-shadow: 0 4px 0 #05050f, 0 6px 14px rgba(0,0,0,.5);
    transition: transform .1s ease;
  }
  .game-card:active { transform: translateY(4px); box-shadow: 0 0 0 #05050f; }

  .icon-frame {
    flex: none; width: 72px; height: 72px; background: #05050f;
    border: 2px solid #4a4a72; border-radius: 4px;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .icon-frame canvas {
    width: 56px; height: 56px;
    image-rendering: pixelated; image-rendering: crisp-edges;
  }

  .card-text { display: flex; flex-direction: column; gap: 4px; }
  .card-title { color: #fff; font-size: clamp(14px, 4vw, 18px); font-weight: 900; letter-spacing: 1px; text-shadow: 1px 1px 0 #000; }
  .card-desc { color: #a0a0c8; font-size: clamp(10px, 2.6vw, 12px); font-weight: 700; }
  .card-arrow { margin-left: auto; color: #ffe15a; font-size: 20px; font-weight: 900; flex: none; }

  .footer-hint {
    margin-top: 10px; color: #5a5a80; font-size: clamp(9px, 2.2vw, 11px); text-align: center; letter-spacing: .5px;
  }
</style>
</head>
<body>
<div id="app">
  <div class="page-title">GAME SELECT</div>

  <div class="card-list">
    <a class="game-card" href="naup.html">
      <div class="icon-frame"><canvas id="iconNaup" width="24" height="24"></canvas></div>
      <div class="card-text">
        <div class="card-title">나 키우기</div>
        <div class="card-desc">육성 시뮬레이션 개그물</div>
      </div>
      <div class="card-arrow">▶</div>
    </a>

    <a class="game-card" href="g9att.html">
      <div class="icon-frame"><canvas id="iconUfo" width="24" height="24"></canvas></div>
      <div class="card-text">
        <div class="card-title">지구침공</div>
        <div class="card-desc">횡스크롤 액션 게임</div>
      </div>
      <div class="card-arrow">▶</div>
    </a>
  </div>

  <div class="footer-hint">PRESS TO START</div>
</div>

<script>
// 픽셀아트 아이콘을 캔버스에 직접 그립니다 (24x24 저해상도 → CSS로 확대해 픽셀 느낌 유지)

function drawNaupIcon(id) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0,0,24,24);

  // 안테나
  ctx.fillStyle = '#ff5a5a';
  ctx.fillRect(11, 1, 2, 2);
  ctx.fillStyle = '#b9c3cf';
  ctx.fillRect(11, 3, 2, 3);

  // 머리 (헬멧형)
  ctx.fillStyle = '#eef3f8';
  ctx.fillRect(7, 6, 10, 7);
  ctx.fillStyle = '#2b3f66';
  ctx.fillRect(9, 7, 6, 4);

  // 눈
  ctx.fillStyle = '#3a9bff';
  ctx.fillRect(10, 8, 1, 1);
  ctx.fillRect(13, 8, 1, 1);

  // 목
  ctx.fillStyle = '#b9c3cf';
  ctx.fillRect(10, 13, 4, 1);

  // 몸통
  ctx.fillStyle = '#3a72e0';
  ctx.fillRect(6, 14, 12, 6);
  ctx.fillStyle = '#eef3f8';
  ctx.fillRect(9, 16, 6, 3);
  ctx.fillStyle = '#ffd76a';
  ctx.fillRect(10, 17, 1, 1);
  ctx.fillRect(13, 17, 1, 1);

  // 팔
  ctx.fillStyle = '#2652a8';
  ctx.fillRect(4, 15, 2, 4);
  ctx.fillRect(18, 15, 2, 4);

  // 다리
  ctx.fillStyle = '#22315c';
  ctx.fillRect(8, 20, 3, 3);
  ctx.fillRect(13, 20, 3, 3);
}

function drawUfoIcon(id) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0,0,24,24);

  // 별
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(3, 3, 1, 1);
  ctx.fillRect(19, 5, 1, 1);
  ctx.fillRect(20, 15, 1, 1);
  ctx.fillRect(4, 18, 1, 1);

  // 빔
  ctx.fillStyle = 'rgba(150,255,180,0.35)';
  ctx.beginPath();
  ctx.moveTo(9, 13); ctx.lineTo(15, 13); ctx.lineTo(19, 22); ctx.lineTo(5, 22);
  ctx.closePath(); ctx.fill();

  // UFO 돔
  ctx.fillStyle = '#c3c8e0';
  ctx.beginPath();
  ctx.ellipse(12, 9, 5, 4, 0, Math.PI, 0);
  ctx.fill();

  // UFO 몸체
  ctx.fillStyle = '#8a8fa8';
  ctx.fillRect(3, 11, 18, 3);
  ctx.fillStyle = '#6a6f88';
  ctx.fillRect(3, 13, 18, 1);

  // 불빛
  ctx.fillStyle = '#5af06e';
  ctx.fillRect(5, 12, 1, 1);
  ctx.fillRect(9, 12, 1, 1);
  ctx.fillRect(14, 12, 1, 1);
  ctx.fillRect(18, 12, 1, 1);
}

drawNaupIcon('iconNaup');
drawUfoIcon('iconUfo');
</script>
</body>
</html>
