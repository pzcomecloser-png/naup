<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>지구침공</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin:0; padding:0; }
  html, body {
    width: 100%; height: 100%; background: #000; overflow: hidden;
    font-family: -apple-system, 'Malgun Gothic', monospace;
  }
  #app {
    position: relative; width: 100%; height: 100%; max-width: 560px; margin: 0 auto;
    background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #stageWrap {
    position: relative; width: 100%; aspect-ratio: 320 / 180; background: #0a1030;
    border: 3px solid #444; box-shadow: 0 0 30px rgba(0,0,0,.8);
  }
  canvas#game {
    width: 100%; height: 100%; display: block;
    image-rendering: pixelated; image-rendering: crisp-edges;
  }
  .overlay {
    position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,.6); text-align: center; padding: 16px; gap: 10px; z-index: 10;
  }
  .overlay.active { display: flex; }
  .ov-title { color: #ffe15a; font-size: clamp(15px, 4.2vw, 24px); font-weight: 900; text-shadow: 2px 2px 0 #000; letter-spacing: 1px; }
  .ov-desc { color: #fff; font-size: clamp(10px, 2.5vw, 13px); font-weight: 700; text-shadow: 1px 1px 0 #000; line-height: 1.55; }
  .ov-btn {
    margin-top: 4px; background: #ffe15a; color: #3a2200; border: none; border-radius: 6px;
    padding: 10px 24px; font-size: clamp(12px, 3vw, 15px); font-weight: 900; cursor: pointer;
    box-shadow: 0 4px 0 #b8880e; letter-spacing: 1px;
  }
  .ov-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8880e; }
  .credit-line { color: #5af06e; font-size: clamp(12px, 3vw, 16px); font-weight: 900; letter-spacing: 1px; margin-top: 6px; }
  #topBar {
    position: absolute; top: 6px; left: 6px; right: 6px; display: flex; align-items: center; gap: 6px; z-index: 5;
  }
  #stageBadge {
    background: rgba(0,0,0,.5); color: #ffe15a; font-size: clamp(8px,2vw,11px); font-weight: 900;
    padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,.4); white-space: nowrap;
  }
  #progressBarWrap {
    flex: 1; height: 8px; background: rgba(0,0,0,.4); border: 1px solid #fff; border-radius: 4px; overflow: hidden;
  }
  #progressBar { height: 100%; width: 0%; background: linear-gradient(90deg,#5af06e,#ffe15a); }
  #hint {
    position: absolute; bottom: 6px; left: 0; right: 0; text-align: center; color: #fff;
    font-size: clamp(9px, 2.2vw, 12px); font-weight: 700; text-shadow: 1px 1px 0 #000; opacity: .8; z-index: 5;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="app">
  <div id="stageWrap">
    <canvas id="game" width="320" height="180"></canvas>

    <div id="topBar">
      <div id="stageBadge">STAGE 1</div>
      <div id="progressBarWrap"><div id="progressBar"></div></div>
    </div>
    <div id="hint">탭 / 클릭 / 스페이스바 = 점프</div>

    <div class="overlay active" id="ovIntro">
      <div class="ov-title">지구침공</div>
      <div class="ov-desc" id="introDesc">한밤중, 정체불명의 UFO가&nbsp;조용한 마을 위로 내려온다...</div>
      <button class="ov-btn" id="introBtn" style="display:none;" onclick="startGameFromIntro()">시작하기 ▶</button>
    </div>

    <div class="overlay" id="ovGameOver">
      <div class="ov-title" style="color:#ff5a5a;">GAME OVER</div>
      <div class="ov-desc" id="gameOverMsg">냉장고에 부딪혔다!</div>
      <button class="ov-btn" onclick="restartGame()">처음부터 다시하기</button>
    </div>

    <div class="overlay" id="ovDirty">
      <div class="ov-title" style="color:#c78a4a;">으악! 더러워!!</div>
      <div class="ov-desc">더러운 것을 밟고 말았다...</div>
      <button class="ov-btn" onclick="restartGame()">처음부터 다시하기</button>
    </div>

    <div class="overlay" id="ovStageClear">
      <div class="ov-title" id="stageClearTitle">STAGE 1 CLEAR!</div>
      <div class="ov-desc" id="stageClearMsg">마트에 도착했다!</div>
      <button class="ov-btn" id="stageClearBtn" onclick="nextStage()">다음 스테이지 ▶</button>
    </div>

    <div class="overlay" id="ovEnding">
      <div class="ov-title" style="color:#ffe15a;">지구침공, 그 후...</div>
      <div class="ov-desc" id="endingStory">
        혼란에 빠진 인간들을 뒤로하고,<br/>
        외계인은 유유히 UFO에 올라탔다.<br/><br/>
        "지구는... 생각보다 재밌는 곳이었다."
      </div>
      <div class="credit-line" id="creditsText" style="display:none;">제작자 : 신경훈</div>
      <button class="ov-btn" id="endingRestartBtn" style="display:none;" onclick="restartGame()">처음부터 다시하기</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const CW = 320, CH = 180;
const GROUND_Y = 150;

// ---------- overlays ----------
const ovIntro = document.getElementById('ovIntro');
const ovGameOver = document.getElementById('ovGameOver');
const ovDirty = document.getElementById('ovDirty');
const ovStageClear = document.getElementById('ovStageClear');
const ovEnding = document.getElementById('ovEnding');
const introDesc = document.getElementById('introDesc');
const introBtn = document.getElementById('introBtn');
const progressBar = document.getElementById('progressBar');
const stageBadge = document.getElementById('stageBadge');
const gameOverMsg = document.getElementById('gameOverMsg');
const stageClearTitle = document.getElementById('stageClearTitle');
const stageClearMsg = document.getElementById('stageClearMsg');
const stageClearBtn = document.getElementById('stageClearBtn');
const endingStory = document.getElementById('endingStory');
const creditsText = document.getElementById('creditsText');
const endingRestartBtn = document.getElementById('endingRestartBtn');

function hideAllOverlays() {
  [ovIntro, ovGameOver, ovDirty, ovStageClear, ovEnding].forEach(o => o.classList.remove('active'));
}

// ---------- stars ----------
const stars = [];
for (let i = 0; i < 40; i++) {
  stars.push({ x: Math.random()*CW, y: Math.random()*90, r: Math.random()<0.8?1:1.6, tw: Math.random()*Math.PI*2 });
}

// ---------- obstacle definitions ----------
const OBSTACLE_DEFS = {
  tv:      { w:20, h:15, name:'텔레비전' },
  washer:  { w:16, h:18, name:'세탁기' },
  fridge:  { w:16, h:26, name:'냉장고' },
  bike:    { w:24, h:17, name:'자전거' },
  poop:    { w:11, h:8,  name:'똥' },
  apple:   { w:12, h:13, name:'사과' },
  bread:   { w:22, h:10, name:'빵' },
  milk:    { w:12, h:18, name:'우유팩' },
  fish:    { w:18, h:10, name:'생선' },
  human:   { w:12, h:22, name:'사람' },
  car:     { w:30, h:16, name:'자동차' },
  cone:    { w:10, h:14, name:'고깔 표지판' },
};

// ---------- stage configs ----------
const PRE_GOAL_GAP = 450;
const STAGES = [
  null,
  { // STAGE 1
    bg: 'night',
    obstacleTypes: ['tv','washer','fridge','bike','poop'],
    targetDistance: 930,   // worldSpeed(92) 기준 약 10초 분량
    goal: { type:'mart', w:70, h:70, name:'마트' },
    clearTitle: 'STAGE 1 CLEAR!',
    clearMsg: '마트에 도착했다! 지구의 먹거리를 만나보자...'
  },
  { // STAGE 2
    bg: 'mart',
    obstacleTypes: ['apple','bread','milk','fish','poop'],
    targetDistance: 1075,
    goal: { type:'exit', w:40, h:60, name:'마트 출구' },
    clearTitle: 'STAGE 2 CLEAR!',
    clearMsg: '어라? 밖이 소란스럽다...\n인간들이 나를 알아챈 것 같다!'
  },
  { // STAGE 3
    bg: 'chaos',
    obstacleTypes: ['human','car','cone','poop'],
    targetDistance: 1200,
    goal: { type:'ufo', w:52, h:34, name:'탈출 지점' },
    clearTitle: 'STAGE 3 CLEAR!',
    clearMsg: '' // 엔딩으로 직행
  }
];

// ---------- game state ----------
let state = 'intro';
let elapsed = 0;
let lastTime = 0;
let currentStage = 1;

// intro anim
let introTime = 0;
let ufoY = -30;

// player
const player = { x: 46, w: 14, h: 18, y: 0, vy: 0, grounded: true, dirty:false, rotate:0 };
player.y = GROUND_Y - player.h;

let obstacles = [];
let distance = 0;
let TARGET_DISTANCE = 1075;
let worldSpeed = 92;
let spawnTimer = 0;
let nextSpawnTime = 1.0;
let goalSpawned = false;
let scrollFreeze = false;
let dirtyTimer = 0;

// running humans decoration for chaos bg
const chaosPeople = [];
for (let i=0;i<6;i++) {
  chaosPeople.push({ ox: Math.random()*400, speedMul: 1.4+Math.random()*0.6, phase: Math.random()*Math.PI*2 });
}
// 안전한 양수 나머지 연산 (배경 요소가 깜빡이지 않도록)
function safeMod(a, m) { return ((a % m) + m) % m; }

function setupStage(stageNum) {
  currentStage = stageNum;
  const cfg = STAGES[stageNum];
  TARGET_DISTANCE = cfg.targetDistance;
  obstacles = [];
  distance = 0;
  worldSpeed = 92;
  spawnTimer = 0;
  nextSpawnTime = randomSpawnGap();
  goalSpawned = false;
  scrollFreeze = false;
  dirtyTimer = 0;
  player.y = GROUND_Y - player.h;
  player.vy = 0;
  player.grounded = true;
  player.dirty = false;
  player.rotate = 0;
  progressBar.style.width = '0%';
  stageBadge.textContent = 'STAGE ' + stageNum;
  state = 'playing';
  hideAllOverlays();
}

function startGameFromIntro() {
  setupStage(1);
}

function nextStage() {
  if (currentStage >= 3) return;
  setupStage(currentStage + 1);
}

function restartGame() {
  state = 'intro';
  introTime = 0;
  hideAllOverlays();
  ovIntro.classList.add('active');
  introDesc.textContent = '한밤중, 정체불명의 UFO가 조용한 마을 위로 내려온다...';
  introBtn.style.display = 'none';
  endingRestartBtn.style.display = 'none';
  creditsText.style.display = 'none';
  endingStory.style.display = 'block';
}

// ---------- input ----------
function doJump() {
  if (state === 'playing' && player.grounded && !player.dirty) {
    player.vy = -190;      // 점프 초기 속도 (체공시간 약 0.76초)
    player.grounded = false;
  }
}
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); doJump(); }
});
document.addEventListener('mousedown', doJump);
document.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); }, { passive:false });

// ---------- spawn ----------
// 간격을 짧게/보통/길게 섞어서 리듬감을 주는 스폰 타이밍
function randomSpawnGap() {
  const r = Math.random();
  if (r < 0.28) return 0.5 + Math.random()*0.35;   // 몰아치기 구간
  if (r < 0.75) return 0.95 + Math.random()*0.6;   // 보통 구간
  return 1.6 + Math.random()*1.0;                   // 여유(숨 고르기) 구간
}
function spawnObstacle() {
  const cfg = STAGES[currentStage];
  const typeName = cfg.obstacleTypes[Math.floor(Math.random() * cfg.obstacleTypes.length)];
  const def = OBSTACLE_DEFS[typeName];
  obstacles.push({
    type: typeName, name: def.name,
    x: CW + 10, y: GROUND_Y - def.h, w: def.w, h: def.h
  });
}

function spawnGoal() {
  const g = STAGES[currentStage].goal;
  obstacles.push({ type: g.type, name: g.name, x: CW + 20, y: GROUND_Y - g.h, w: g.w, h: g.h, isGoal:true });
  goalSpawned = true;
}

// ---------- update ----------
function updateGame(dt) {
  if (!scrollFreeze) {
    distance += worldSpeed * dt;
    const prog = Math.min(1, distance / TARGET_DISTANCE);
    progressBar.style.width = (prog*100) + '%';

    if (distance < TARGET_DISTANCE - PRE_GOAL_GAP && !goalSpawned) {
      spawnTimer += dt;
      if (spawnTimer >= nextSpawnTime) {
        spawnTimer = 0;
        nextSpawnTime = randomSpawnGap();
        spawnObstacle();
      }
    } else if (!goalSpawned && distance >= TARGET_DISTANCE - PRE_GOAL_GAP) {
      spawnGoal();
    }

    for (const o of obstacles) o.x -= worldSpeed * dt;
    obstacles = obstacles.filter(o => o.x + o.w > -10);
  }

  // player physics (체공시간 소폭 단축된 완만한 포물선)
  if (!player.dirty) {
    player.vy += 500 * dt;   // 중력 (체공시간 단축 반영)
    player.y += player.vy * dt;
    if (player.y >= GROUND_Y - player.h) {
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.grounded = true;
    }
    player.rotate = player.grounded ? 0 : Math.max(-25, player.rotate - dt*300);
    if (player.grounded) player.rotate = 0;
  }

  // collisions
  if (state === 'playing' && !scrollFreeze) {
    const px = player.x, py = player.y, pw = player.w, ph = player.h;
    for (const o of obstacles) {
      const pad = 3;
      const overlap = px+pad < o.x+o.w && px+pw-pad > o.x && py+pad < o.y+o.h && py+ph-pad > o.y;
      if (overlap) {
        if (o.isGoal) {
          scrollFreeze = true;
          if (currentStage < 3) {
            state = 'stageclear';
            const cfg = STAGES[currentStage];
            stageClearTitle.textContent = cfg.clearTitle;
            stageClearMsg.textContent = cfg.clearMsg;
            stageClearBtn.style.display = 'inline-block';
            setTimeout(()=>{ ovStageClear.classList.add('active'); }, 350);
          } else {
            state = 'ending';
            setTimeout(()=>{ showEnding(); }, 350);
          }
        } else if (o.type === 'poop') {
          player.dirty = true;
          scrollFreeze = true;
          state = 'dirty';
          dirtyTimer = 0;
        } else {
          scrollFreeze = true;
          state = 'gameover';
          gameOverMsg.textContent = o.name + '에 부딪혔다!';
          setTimeout(()=>{ ovGameOver.classList.add('active'); }, 300);
        }
        break;
      }
    }
  }

  if (state === 'dirty') {
    dirtyTimer += dt;
    if (dirtyTimer > 0.9) {
      ovDirty.classList.add('active');
      dirtyTimer = -999;
    }
  }
}

function showEnding() {
  hideAllOverlays();
  endingStory.style.display = 'block';
  creditsText.style.display = 'none';
  endingRestartBtn.style.display = 'none';
  ovEnding.classList.add('active');
  setTimeout(() => {
    endingStory.style.display = 'none';
    creditsText.style.display = 'block';
    endingRestartBtn.style.display = 'inline-block';
  }, 2600);
}

// ---------- background: STAGE 1 (night street) ----------
function drawSkyNight() {
  const grad = ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0, '#0a0a24');
  grad.addColorStop(0.55, '#141238');
  grad.addColorStop(1, '#1c1a44');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,CW,CH);
}
function drawStars(t) {
  for (const s of stars) {
    const a = 0.5 + 0.5*Math.sin(t*2 + s.tw);
    ctx.fillStyle = `rgba(255,255,255,${0.3+0.6*a})`;
    ctx.fillRect(s.x, s.y, s.r, s.r);
  }
}
function drawBuildings(offset) {
  const patternW = 80;
  const off = safeMod(offset, patternW);
  const startIdx = Math.floor(offset / patternW) - 1;
  for (let i = startIdx; i < startIdx + Math.ceil(CW/patternW) + 3; i++) {
    const bx = i*patternW - off - patternW;
    const seed = ((i%5)+5)%5;
    const bh = 40 + seed*10;
    const by = GROUND_Y - bh - 4;
    ctx.fillStyle = '#232049';
    ctx.fillRect(bx, by, 60, bh+4);
    ctx.fillStyle = '#171533';
    ctx.fillRect(bx+6, GROUND_Y-4-18, 20, 18);
    for (let s=0; s<4; s++) {
      ctx.fillStyle = '#1f1c40';
      ctx.fillRect(bx+6, GROUND_Y-4-18+s*4.5, 20, 2);
    }
    ctx.fillStyle = '#100e28';
    for (let wx=0; wx<2; wx++) {
      for (let wy=0; wy<Math.floor(bh/16); wy++) {
        ctx.fillRect(bx+34+wx*14, by+6+wy*16, 8, 9);
      }
    }
    ctx.fillStyle = '#3a3768';
    ctx.fillRect(bx+4, by-8, 30, 6);
  }
}
function drawStreetLamps(offset) {
  const patternW = 100;
  const off = safeMod(offset, patternW);
  const startIdx = Math.floor(offset / patternW) - 1;
  for (let i = startIdx; i < startIdx + Math.ceil(CW/patternW) + 3; i++) {
    const lx = i*patternW - off - patternW + 40;
    const ly = GROUND_Y;
    const grad = ctx.createRadialGradient(lx, ly-46, 2, lx, ly-46, 26);
    grad.addColorStop(0, 'rgba(255,230,140,0.55)');
    grad.addColorStop(1, 'rgba(255,230,140,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(lx-26, ly-72, 52, 52);
    ctx.fillStyle = '#3a3a44';
    ctx.fillRect(lx-1, ly-50, 3, 50);
    ctx.fillRect(lx-6, ly-52, 13, 3);
    ctx.fillStyle = '#ffe697';
    ctx.fillRect(lx, ly-56, 5, 6);
  }
}
function drawRoadNight(offset) {
  ctx.fillStyle = '#232232';
  ctx.fillRect(0, GROUND_Y, CW, CH-GROUND_Y);
  ctx.fillStyle = '#2c2b3e';
  ctx.fillRect(0, GROUND_Y, CW, 3);
  const dashW = 14, gapW = 10, total = dashW+gapW;
  const off = safeMod(offset, total);
  ctx.fillStyle = '#ffe15a';
  for (let x = -off; x < CW; x += total) {
    ctx.fillRect(x, GROUND_Y + 14, dashW, 3);
  }
}

// ---------- background: STAGE 2 (mart interior) ----------
function drawMartBg(offset) {
  const grad = ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0, '#1f4a45');
  grad.addColorStop(0.6, '#183a37');
  grad.addColorStop(1, '#122a28');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,CW,CH);

  // fluorescent ceiling lights
  const lampW = 60;
  const lampOff = safeMod(offset, lampW);
  const startIdx = Math.floor(offset / lampW) - 1;
  for (let i = startIdx; i < startIdx + Math.ceil(CW/lampW) + 3; i++) {
    const lx = i*lampW - lampOff - lampW + 10;
    ctx.fillStyle = '#eaffe0';
    ctx.fillRect(lx, 6, 36, 5);
    ctx.fillStyle = 'rgba(234,255,224,0.18)';
    ctx.fillRect(lx-10, 11, 56, 20);
  }

  // shelves (aisle backdrop) - 짙은 청록 톤으로 통일해 밝은 원색 장애물과 대비
  const patternW = 76;
  const shelfOff = safeMod(offset, patternW);
  const sIdx = Math.floor(offset / patternW) - 1;
  for (let i = sIdx; i < sIdx + Math.ceil(CW/patternW) + 3; i++) {
    const bx = i*patternW - shelfOff - patternW;
    const by = GROUND_Y - 66;
    ctx.fillStyle = '#0f3330';
    ctx.fillRect(bx, by, 58, 66);
    ctx.fillStyle = '#0a2422';
    ctx.fillRect(bx+3, by+4, 52, 3);
    ctx.fillRect(bx+3, by+22, 52, 3);
    ctx.fillRect(bx+3, by+40, 52, 3);
    // 짙은 청록 계열 상자 (원색 장애물과 확실히 구분되도록 채도/명도 낮춤)
    const shelfColors = ['#1c4a45','#204f4a','#193f3b','#245550'];
    for (let r=0;r<3;r++) {
      for (let c=0;c<5;c++) {
        ctx.fillStyle = shelfColors[(r+c+i)%shelfColors.length];
        ctx.fillRect(bx+4+c*10, by+7+r*18, 8, 10);
      }
    }
  }
}
function drawFloorMart(offset) {
  ctx.fillStyle = '#173f3b';
  ctx.fillRect(0, GROUND_Y, CW, CH-GROUND_Y);
  ctx.fillStyle = '#102b28';
  ctx.fillRect(0, GROUND_Y, CW, 3);
  const tile = 20;
  const off = safeMod(offset, tile);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  for (let x = -off; x < CW; x += tile) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y+4); ctx.lineTo(x, CH); ctx.stroke();
  }
}

// ---------- background: STAGE 3 (chaos daytime) ----------
function drawSkyChaos(t) {
  const grad = ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0, '#1a2050');
  grad.addColorStop(0.5, '#232a63');
  grad.addColorStop(1, '#2c3577');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,CW,CH);
  // flashing alarm tint
  const flash = 0.5+0.5*Math.sin(t*8);
  ctx.fillStyle = `rgba(255,50,50,${0.07+0.07*flash})`;
  ctx.fillRect(0,0,CW,CH);
}
function drawBuildingsChaos(offset) {
  const patternW = 80;
  const bOff = safeMod(offset, patternW);
  const startIdx = Math.floor(offset / patternW) - 1;
  for (let i = startIdx; i < startIdx + Math.ceil(CW/patternW) + 3; i++) {
    const bx = i*patternW - bOff - patternW;
    const seed = ((i%5)+5)%5;
    const bh = 40 + seed*10;
    const by = GROUND_Y - bh - 4;
    ctx.fillStyle = '#14183a';
    ctx.fillRect(bx, by, 60, bh+4);
    ctx.fillStyle = '#3a4470';
    for (let wx=0; wx<2; wx++) {
      for (let wy=0; wy<Math.floor(bh/16); wy++) {
        ctx.fillRect(bx+16+wx*22, by+6+wy*16, 10, 10);
      }
    }
  }
  // running people silhouettes (decorative, background layer) - 안전한 모듈러 좌표
  const wrapW = CW + 60;
  for (const p of chaosPeople) {
    const px = safeMod(p.ox - offset*p.speedMul, wrapW) - 30;
    const py = GROUND_Y - 34;
    const legSwing = Math.sin(offset*0.3 + p.phase) * 3;
    ctx.fillStyle = '#0c0e22';
    ctx.fillRect(px, py, 5, 12);
    ctx.beginPath(); ctx.arc(px+2.5, py-3, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(px+legSwing*0.4, py+12, 2, 8);
    ctx.fillRect(px+4-legSwing*0.4, py+12, 2, 8);
  }
}
function drawRoadChaos(offset) {
  ctx.fillStyle = '#191c3c';
  ctx.fillRect(0, GROUND_Y, CW, CH-GROUND_Y);
  ctx.fillStyle = '#121430';
  ctx.fillRect(0, GROUND_Y, CW, 3);
  const dashW = 14, gapW = 10, total = dashW+gapW;
  const off = safeMod(offset, total);
  ctx.fillStyle = '#ffe15a';
  for (let x = -off; x < CW; x += total) {
    ctx.fillRect(x, GROUND_Y + 14, dashW, 3);
  }
}

// ---------- player drawing ----------
function drawPlayer(t) {
  ctx.save();
  ctx.translate(player.x + player.w/2, player.y + player.h/2);
  ctx.rotate(player.rotate * Math.PI/180);
  ctx.translate(-player.w/2, -player.h/2);

  const bodyColor = player.dirty ? '#6b7a2c' : '#4fe06a';
  const bodyShadow = player.dirty ? '#4a5620' : '#2fa348';

  ctx.fillStyle = bodyShadow;
  ctx.fillRect(2, player.h-4, 4, 4);
  ctx.fillRect(player.w-6, player.h-4, 4, 4);

  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(player.w/2, player.h*0.55, player.w/2, player.h*0.42, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(player.w/2, player.h*0.28, player.w*0.42, player.h*0.28, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.ellipse(player.w*0.32, player.h*0.28, 2.6, 3.4, 0, 0, Math.PI*2);
  ctx.ellipse(player.w*0.68, player.h*0.28, 2.6, 3.4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(player.w*0.32-1, player.h*0.28-2, 1, 1);
  ctx.fillRect(player.w*0.68-1, player.h*0.28-2, 1, 1);

  if (player.dirty) {
    ctx.fillStyle = '#3d2a10';
    ctx.beginPath();
    ctx.arc(player.w*0.3, player.h*0.6, 2, 0, Math.PI*2);
    ctx.arc(player.w*0.7, player.h*0.5, 1.6, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// ---------- obstacle drawing ----------
function drawObstacle(o) {
  ctx.save();
  ctx.translate(o.x, o.y);

  switch (o.type) {
    case 'tv': {
      ctx.fillStyle = '#3a3a3a'; ctx.fillRect(0,0,o.w,o.h);
      ctx.fillStyle = '#6fb0e0'; ctx.fillRect(2,2,o.w-4,o.h-6);
      break;
    }
    case 'washer': {
      ctx.fillStyle = '#dcdcdc'; ctx.fillRect(0,0,o.w,o.h);
      ctx.fillStyle = '#8a8a8a'; ctx.beginPath(); ctx.arc(o.w/2, o.h*0.55, o.w*0.32, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3a5a7a'; ctx.beginPath(); ctx.arc(o.w/2, o.h*0.55, o.w*0.22, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'fridge': {
      ctx.fillStyle = '#e8e8e8'; ctx.fillRect(0,0,o.w,o.h);
      ctx.fillStyle = '#b0b0b0'; ctx.fillRect(0, o.h*0.32, o.w, 2);
      ctx.fillStyle = '#8a8a8a'; ctx.fillRect(o.w-4, 3, 2, 8); ctx.fillRect(o.w-4, o.h*0.32+5, 2, 8);
      break;
    }
    case 'bike': {
      ctx.strokeStyle = '#cfcfcf'; ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.arc(o.w*0.24, o.h*0.78, o.h*0.32, 0, Math.PI*2);
      ctx.arc(o.w*0.76, o.h*0.78, o.h*0.32, 0, Math.PI*2);
      ctx.stroke();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(o.w*0.24, o.h*0.78, 1.6, 0, Math.PI*2); ctx.arc(o.w*0.76, o.h*0.78, 1.6, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#e0a030';
      ctx.beginPath();
      ctx.moveTo(o.w*0.24, o.h*0.78); ctx.lineTo(o.w*0.5, o.h*0.3); ctx.lineTo(o.w*0.76, o.h*0.78);
      ctx.lineTo(o.w*0.5, o.h*0.3); ctx.lineTo(o.w*0.6, o.h*0.78);
      ctx.stroke();
      break;
    }
    case 'poop': {
      ctx.fillStyle = '#6b4423';
      ctx.beginPath(); ctx.ellipse(o.w/2, o.h*0.85, o.w*0.5, o.h*0.35, 0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(o.w/2, o.h*0.5, o.w*0.36, o.h*0.3, 0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(o.w/2, o.h*0.2, o.w*0.22, o.h*0.2, 0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(200,200,200,0.5)';
      ctx.beginPath();
      ctx.moveTo(o.w*0.1,-2); ctx.quadraticCurveTo(o.w*0.05,-8,o.w*0.15,-14);
      ctx.moveTo(o.w*0.85,-2); ctx.quadraticCurveTo(o.w*0.9,-8,o.w*0.8,-14);
      ctx.stroke();
      break;
    }
    case 'apple': {
      ctx.fillStyle = '#e04a3a';
      ctx.beginPath(); ctx.ellipse(o.w/2, o.h*0.58, o.w*0.48, o.h*0.42, 0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#4a7a2a'; ctx.fillRect(o.w*0.5-1, 0, 3, 5);
      ctx.beginPath(); ctx.ellipse(o.w*0.65, 3, 4, 2.2, -0.4, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'bread': {
      ctx.fillStyle = '#c98a4a';
      ctx.beginPath(); ctx.roundRect ? ctx.roundRect(0,0,o.w,o.h,5) : ctx.rect(0,0,o.w,o.h);
      ctx.fill();
      ctx.strokeStyle = '#8a5a2a'; ctx.lineWidth = 1.2;
      for (let i=0;i<3;i++) { ctx.beginPath(); ctx.moveTo(4+i*6, 2); ctx.lineTo(8+i*6, o.h-2); ctx.stroke(); }
      break;
    }
    case 'milk': {
      ctx.fillStyle = '#f5f5f5'; ctx.fillRect(0,3,o.w,o.h-3);
      ctx.beginPath(); ctx.moveTo(0,3); ctx.lineTo(o.w/2,0); ctx.lineTo(o.w,3); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#3a9bff'; ctx.fillRect(2, o.h*0.4, o.w-4, o.h*0.3);
      break;
    }
    case 'fish': {
      ctx.fillStyle = '#8aa5c0';
      ctx.beginPath(); ctx.ellipse(o.w*0.4, o.h/2, o.w*0.38, o.h*0.42, 0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(o.w*0.75,o.h*0.15); ctx.lineTo(o.w,o.h/2); ctx.lineTo(o.w*0.75,o.h*0.85); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#0a0a0a'; ctx.beginPath(); ctx.arc(o.w*0.2, o.h*0.42, 1.4, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'human': {
      ctx.fillStyle = '#f4c28c'; ctx.beginPath(); ctx.arc(o.w/2, 4, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#4a6fd0'; ctx.fillRect(o.w/2-4, 8, 8, 9);
      ctx.fillStyle = '#2a3a5c'; ctx.fillRect(o.w/2-4, 17, 3, 5); ctx.fillRect(o.w/2+1, 17, 3, 5);
      break;
    }
    case 'car': {
      ctx.fillStyle = '#d3453a'; ctx.fillRect(0, o.h*0.35, o.w, o.h*0.4);
      ctx.beginPath(); ctx.moveTo(o.w*0.15,o.h*0.35); ctx.lineTo(o.w*0.3,o.h*0.05);
      ctx.lineTo(o.w*0.7,o.h*0.05); ctx.lineTo(o.w*0.85,o.h*0.35); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#bfe6f5'; ctx.fillRect(o.w*0.35,o.h*0.12,o.w*0.3,o.h*0.2);
      ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(o.w*0.22,o.h*0.78,3.5,0,Math.PI*2); ctx.arc(o.w*0.78,o.h*0.78,3.5,0,Math.PI*2); ctx.fill();
      break;
    }
    case 'cone': {
      ctx.fillStyle = '#ff7a2a';
      ctx.beginPath(); ctx.moveTo(o.w/2,0); ctx.lineTo(o.w,o.h*0.85); ctx.lineTo(0,o.h*0.85); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.fillRect(o.w*0.2,o.h*0.5,o.w*0.6,3);
      ctx.fillStyle = '#c85a1a'; ctx.fillRect(-2,o.h*0.85,o.w+4,o.h*0.15);
      break;
    }
    case 'mart': {
      ctx.fillStyle = '#d3453a'; ctx.fillRect(0,0,o.w,o.h);
      ctx.fillStyle = '#fff'; ctx.fillRect(4,6,o.w-8,14);
      ctx.fillStyle = '#d3453a'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
      ctx.fillText('MART', o.w/2, 16);
      ctx.fillStyle = '#8fd0ef';
      for (let i=0;i<3;i++) ctx.fillRect(6+i*22, 28, 16, 22);
      ctx.fillStyle = '#c94237'; ctx.fillRect(o.w*0.32, o.h-26, o.w*0.36, 26);
      break;
    }
    case 'exit': {
      ctx.fillStyle = '#4a5a70'; ctx.fillRect(0,0,o.w,o.h);
      ctx.fillStyle = '#8fb0d0'; ctx.fillRect(4,6,o.w-8,o.h-10);
      ctx.fillStyle = '#5fce6a'; ctx.fillRect(0,-14,o.w,12);
      ctx.fillStyle = '#0a2a10'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
      ctx.fillText('EXIT', o.w/2, -5);
      break;
    }
    case 'ufo': {
      ctx.fillStyle = '#8a8fa8'; ctx.beginPath(); ctx.ellipse(o.w/2,o.h*0.6,o.w/2,o.h*0.22,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#c3c8e0'; ctx.beginPath(); ctx.ellipse(o.w/2,o.h*0.32,o.w*0.32,o.h*0.32,0,Math.PI,0); ctx.fill();
      ctx.fillStyle = '#5af06e';
      for (let i=-1;i<=1;i++) { ctx.beginPath(); ctx.arc(o.w/2+i*(o.w*0.24), o.h*0.68, 2.4, 0, Math.PI*2); ctx.fill(); }
      break;
    }
  }
  ctx.restore();
}

// ---------- scene composition ----------
function drawGameScene(t, dt) {
  const bg = STAGES[currentStage].bg;
  if (bg === 'night') {
    drawSkyNight(); drawStars(t); drawBuildings(distance*0.5); drawStreetLamps(distance*0.7); drawRoadNight(distance);
  } else if (bg === 'mart') {
    drawMartBg(distance*0.6); drawFloorMart(distance);
  } else if (bg === 'chaos') {
    drawSkyChaos(t); drawBuildingsChaos(distance*0.55); drawRoadChaos(distance);
  }
  for (const o of obstacles) drawObstacle(o);
  drawPlayer(t);
}

// ---------- intro scene ----------
function drawIntroScene(t) {
  drawSkyNight();
  drawStars(t);
  ctx.fillStyle = '#161433';
  for (let i=0;i<5;i++) ctx.fillRect(10+i*64, 130 - (i%3)*14, 46, 40 + (i%3)*14);
  ctx.fillStyle = '#232232';
  ctx.fillRect(0, GROUND_Y, CW, CH-GROUND_Y);

  const ufoTargetY = 46;
  const phase1 = Math.min(1, introTime/2.2);
  ufoY = -40 + phase1*(ufoTargetY+40);
  const ufoX = CW/2;

  if (introTime > 1.0) {
    const beamA = Math.min(1,(introTime-1.0)/1.0);
    const grad = ctx.createLinearGradient(0, ufoY+10, 0, GROUND_Y);
    grad.addColorStop(0, `rgba(150,255,180,${0.35*beamA})`);
    grad.addColorStop(1, `rgba(150,255,180,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(ufoX-6, ufoY+10); ctx.lineTo(ufoX+6, ufoY+10);
    ctx.lineTo(ufoX+26, GROUND_Y); ctx.lineTo(ufoX-26, GROUND_Y);
    ctx.closePath(); ctx.fill();
  }

  ctx.save();
  ctx.translate(ufoX, ufoY);
  ctx.fillStyle = '#8a8fa8'; ctx.beginPath(); ctx.ellipse(0,0,26,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#c3c8e0'; ctx.beginPath(); ctx.ellipse(0,-6,12,10,0,Math.PI,0); ctx.fill();
  ctx.fillStyle = '#5af06e';
  for (let i=-2;i<=2;i++) { ctx.beginPath(); ctx.arc(i*9, 3, 2, 0, Math.PI*2); ctx.fill(); }
  ctx.restore();

  if (introTime > 2.2) {
    const alienT = introTime - 2.2;
    const ax = CW/2 - 7, ay = GROUND_Y - 20;
    ctx.save();
    ctx.translate(ax, ay);
    ctx.fillStyle = '#4fe06a';
    ctx.beginPath(); ctx.ellipse(7,11,7,9,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7,5,6,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0a0a0a';
    const lookOffset = Math.sin(alienT*2)*1.5;
    ctx.beginPath();
    ctx.ellipse(4.5+lookOffset,5,1.8,2.4,0,0,Math.PI*2);
    ctx.ellipse(9.5+lookOffset,5,1.8,2.4,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    if (introTime > 3.4) {
      const bubbleA = Math.min(1,(introTime-3.4)/0.4);
      ctx.save();
      ctx.globalAlpha = bubbleA;
      ctx.fillStyle = '#fff';
      const bw=150, bh=30, bx=CW/2-bw/2, by=ay-40;
      ctx.beginPath();
      ctx.moveTo(bx+6,by); ctx.lineTo(bx+bw-6,by);
      ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+6);
      ctx.lineTo(bx+bw,by+bh-6);
      ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-6,by+bh);
      ctx.lineTo(bx+bw/2+6,by+bh);
      ctx.lineTo(bx+bw/2,by+bh+8);
      ctx.lineTo(bx+bw/2-4,by+bh);
      ctx.lineTo(bx+6,by+bh);
      ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-6);
      ctx.lineTo(bx,by+6);
      ctx.quadraticCurveTo(bx,by,bx+6,by);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.font = 'bold 10px "Malgun Gothic", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('지구는 나의 것이다', bx+bw/2, by+13);
      ctx.fillText('하하하하!!', bx+bw/2, by+25);
      ctx.restore();
    }
  }
}

// ---------- main loop ----------
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(0.033, (ts - lastTime)/1000);
  lastTime = ts;
  elapsed += dt;

  ctx.clearRect(0,0,CW,CH);

  if (state === 'intro') {
    introTime += dt;
    drawIntroScene(elapsed);
    if (introTime > 3.4 && introBtn.style.display === 'none') {
      introDesc.textContent = '';
      introBtn.style.display = 'inline-block';
    }
  } else if (state === 'playing' || state === 'gameover' || state === 'dirty' || state === 'stageclear' || state === 'ending') {
    if (state === 'playing') updateGame(dt);
    drawGameScene(elapsed, dt);
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
